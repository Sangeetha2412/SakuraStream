{% extends 'base.html' %}{% block title %}Edit Profile — SakuraStream{% endblock %}{% block content %}
<div class="max-w-xl mx-auto px-4 py-8">
<h1 class="text-3xl font-black text-white mb-6">Edit Profile</h1>
<div class="glass-card rounded-2xl p-8">
<form method="POST" enctype="multipart/form-data" class="space-y-4">{% csrf_token %}
{% for field in form %}<div><label class="text-white/60 text-xs mb-1 block">{{ field.label }}</label>{{ field }}{% if field.errors %}<p class="text-red-400 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}</div>{% endfor %}
<div class="flex gap-3 pt-2"><button type="submit" class="btn-sakura py-2.5 px-6">Save Changes</button><a href="/users/profile/{{ user.username }}/" class="btn-ghost py-2.5 px-6">Cancel</a></div>
</form></div></div>{% endblock %}
