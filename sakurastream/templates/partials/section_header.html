<div class="flex items-center justify-between mb-6">
    <div>
        <h2 class="section-title text-white">{{ title }}</h2>
        {% if subtitle %}<p class="text-white/40 text-sm mt-1">{{ subtitle }}</p>{% endif %}
    </div>
    {% if link %}
    <a href="{{ link }}" class="flex items-center gap-1 text-sm text-sakura hover:text-sakura-dark transition-colors font-medium group">
        {{ link_text|default:"View All" }}
        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </a>
    {% endif %}
</div>
