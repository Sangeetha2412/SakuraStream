services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: sakurastream
      POSTGRES_USER: sakura
      POSTGRES_PASSWORD: sakura123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sakura -d sakurastream"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - media_files:/app/media
      - static_files:/app/staticfiles
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn sakurastream.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  celery:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - media_files:/app/media
    env_file:
      - .env
    command: celery -A sakurastream worker -l info -c 1

  celery-beat:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    env_file:
      - .env
    command: celery -A sakurastream beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro

volumes:
  postgres_data:
  redis_data:
  media_files:
  static_files:
